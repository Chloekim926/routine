<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>바른생활루틴이들</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;background:#F8F9FC;color:#1E1B4B}
button{font-family:inherit}input{font-family:inherit}
::-webkit-scrollbar{display:none}
.header{background:#1E1B4B;color:#fff;padding:18px 18px 14px}
.header-row{display:flex;justify-content:space-between;align-items:flex-start}
.header h1{font-size:17px;font-weight:800;letter-spacing:-0.3px;margin:0}
.header .sub{font-size:12px;color:#94A3B8;margin-top:4px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px}
.btn-login{background:transparent;color:#94A3B8;border:1px solid #475569;border-radius:8px;padding:5px 14px;font-size:12px;cursor:pointer}
.btn-admin{background:#fff;color:#1E1B4B;border:none;border-radius:20px;padding:5px 14px;font-weight:800;font-size:12px;cursor:pointer}
.tabs{display:flex;background:#fff;border-bottom:1px solid #E8E7F0;position:sticky;top:0;z-index:20}
.tabs button{flex:1;padding:11px 0;border:none;background:none;cursor:pointer;font-size:12px;white-space:nowrap;border-bottom:2px solid transparent;color:#94A3B8;font-weight:400}
.tabs button.active{color:#1E1B4B;font-weight:700;border-bottom-color:#1E1B4B}
.content{padding:14px}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;border:1px solid #E8E7F0}
.card-flush{background:#fff;border-radius:10px;margin-bottom:10px;border:1px solid #E8E7F0;overflow:hidden}
.inp{padding:10px 14px;border:1px solid #E8E7F0;border-radius:8px;font-size:13px;outline:none;background:#fff;color:#1E1B4B;width:100%}
.inp:focus{border-color:#1E1B4B}
.btn{background:#1E1B4B;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;padding:10px 18px}
.btn-outline{background:none;border:1px solid #E8E7F0;border-radius:8px;cursor:pointer;font-size:12px;color:#1E1B4B;padding:8px 12px}
.btn-danger{background:#FEF2F2;color:#DC2626;border:1px solid #FCA5A5;border-radius:8px;font-weight:700;cursor:pointer;padding:10px;width:100%}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:#fff;border-radius:10px;padding:12px 8px;text-align:center;border:1px solid #E8E7F0}
.stat-label{font-size:10px;color:#94A3B8;font-weight:600}
.stat-val{font-weight:900;font-size:22px;color:#1E1B4B;margin-top:2px}
.group-header{padding:10px 14px;border-left:3px solid;display:flex;align-items:center;justify-content:space-between}
.member-row{display:flex;align-items:center;padding:11px 14px;cursor:pointer}
.member-row+.member-row{border-top:1px solid #F8F9FC}
.rank-circle{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-right:10px;flex-shrink:0}
.overlay{position:fixed;inset:0;background:rgba(30,27,75,0.6);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-bottom{align-items:flex-end}
.modal{background:#fff;border-radius:14px;padding:24px;width:300px}
.modal-bottom{background:#fff;border-radius:14px 14px 0 0;padding:22px;width:100%;max-width:480px;max-height:88vh;overflow:auto}
.progress-bar{height:4px;background:#E8E7F0;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width 0.3s}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1E1B4B;color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;z-index:200;white-space:nowrap}
.chart-container{padding:0 4px 10px;height:160px}
.chart-container canvas{width:100%!important;height:100%!important}
.period-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.period-row+.period-row{border-top:1px solid #F8F9FC}
.period-dot{width:6px;height:6px;border-radius:50%;background:#1E1B4B;flex-shrink:0;margin-right:8px}
.goal-tag{background:#F8F9FC;color:#1E1B4B;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid #E8E7F0;display:inline-block;margin:2px}
.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:#1E1B4B;color:#fff;font-size:15px}
</style>
</head>
<body>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyD8ZMyHhrL7tiCNyhTSxBXWdGxqUg8XwF8",
  authDomain:"routine-ca0ee.firebaseapp.com",
  projectId:"routine-ca0ee",
  storageBucket:"routine-ca0ee.firebasestorage.app",
  messagingSenderId:"845375711200",
  appId:"1:845375711200:web:b7a68f8963860a26432d85"
});
const db=firebase.firestore();
const DOC_REF=db.collection("routine").doc("main");

const NAVY="#1E1B4B",MID="#94A3B8",RED="#DC2626",GREEN="#10B981";
const GC={
  1:{border:NAVY,text:NAVY,badge:"#E8E7F0",label:"S등급",range:"100% 이상"},
  2:{border:"#475569",text:"#334155",badge:"#E2E8F0",label:"A등급",range:"85~99%"},
  3:{border:MID,text:"#64748B",badge:"#F1F5F9",label:"B등급",range:"50~84%"},
  4:{border:RED,text:RED,badge:"#FEE2E2",label:"C등급",range:"50% 미만 / 개별목표 50% 미만"},
};

function mkData(){return{config:{totalWeeks:10,currentWeek:1,adminPw:"5115",periods:{rest1Start:"2026-03-30",rest1End:"2026-04-05",rest2Start:"2026-04-06",rest2End:"2026-04-12",opStart:"2026-04-13",opEnd:"2026-06-21"}},members:[],records:{}}}

function getGroupId(r,gs){if(gs.some(g=>g.target>0&&g.rate<0.5)||r<0.5)return 4;if(r>=1)return 1;if(r>=0.85)return 2;return 3}

function calcStats(m,rec,w){
  const gs=m.goals.map((g,gi)=>{let wc=0,ac=0;for(let i=1;i<=w;i++){const v=rec["w"+i]?.[m.id]?.[gi];if(v!=null&&v!==""){wc++;ac+=Math.max(0,+v)}}const t=wc*g.target;return{name:g.name,weeklyTarget:g.target,target:t,achieved:ac,weekCount:wc,rate:t>0?ac/t:0}});
  const tt=gs.reduce((s,g)=>s+g.target,0),ta=gs.reduce((s,g)=>s+g.achieved,0),or=tt>0?ta/tt:0;
  return{goalStats:gs,totalTarget:tt,totalAchieved:ta,overallRate:or,groupId:tt===0?4:getGroupId(or,gs)}
}

function getWeeklyRates(m,rec,w){const r=[];for(let i=1;i<=w;i++){const rc=rec["w"+i]?.[m.id];if(!rc){r.push(null);continue}let t=0,a=0;m.goals.forEach((g,gi)=>{const v=rc[gi];if(v!=null&&v!==""){t+=g.target;a+=Math.max(0,+v)}});r.push(t>0?Math.round(a/t*100):null)}return r}

function getCurrentPeriod(p){
  const n=new Date();n.setHours(0,0,0,0);
  const ck=(s,e)=>s&&e&&n>=new Date(s)&&n<=new Date(e);
  if(ck(p.rest1Start,p.rest1End))return{phase:"rest1",label:"안식주1 · 목표작성"};
  if(ck(p.rest2Start,p.rest2End))return{phase:"rest2",label:"안식주2 · 휴식"};
  if(p.opStart&&p.opEnd){const s=new Date(p.opStart),e=new Date(p.opEnd);if(n>=s&&n<=e){return{phase:"op",label:"운영기간 · "+( Math.floor((n-s)/6048e5)+1)+"주차"}}if(n<s)return{phase:"before_op",label:"운영 시작 전"};if(n>e)return{phase:"ended",label:"운영 종료"}}
  return{phase:"unknown",label:"기간 미설정"}
}
function fmtDate(d){return d?d.replace(/-/g,"."):"-"}
function pct(r){return Math.round(r*100)+"%"}

// ─── State ───
let S={data:null,loading:true,tab:"dash",isAdmin:false,modal:null,selId:null,toast:"",
  newName:"",goalForm:[],weekInputs:{},newPw:"",pwInput:"",deleteConfirm:null,nicknameEdit:{},periodEdit:null,charts:{}};

// ─── Firebase ───
DOC_REF.onSnapshot(doc=>{
  if(doc.exists){const d=doc.data();if(!d.config.periods)d.config.periods=mkData().config.periods;S.data=d}
  else{const init=mkData();DOC_REF.set(init);S.data=init}
  S.loading=false;render()
},err=>{console.error(err);S.data=mkData();S.loading=false;render()});

async function save(nd){S.data=nd;render();try{await DOC_REF.set(nd)}catch(e){console.error(e)}}
function showToast(m){S.toast=m;render();setTimeout(()=>{S.toast="";render()},2500)}

// ─── Render (no re-render on typing) ───
function render(){
  const app=document.getElementById("app");
  // Save focused element info
  const activeId=document.activeElement?.dataset?.sid||null;
  const selStart=document.activeElement?.selectionStart;
  const selEnd=document.activeElement?.selectionEnd;

  app.innerHTML="";
  if(S.loading){app.innerHTML='<div class="loading-screen">불러오는 중...</div>';return}

  const D=S.data,cfg=D.config,P=cfg.periods||{},CP=getCurrentPeriod(P);
  const goalLocked=CP.phase!=="rest1"&&CP.phase!=="unknown"&&CP.phase!=="before_op";
  const mws=D.members.map(m=>({...m,stats:calcStats(m,D.records,cfg.currentWeek)})).sort((a,b)=>b.stats.overallRate-a.stats.overallRate);
  const byGrp=[1,2,3,4].map(g=>({gid:g,...GC[g],members:mws.filter(m=>m.stats.groupId===g)}));
  const selMem=S.selId?mws.find(m=>m.id===S.selId):null;
  const avgRate=D.members.length?mws.reduce((s,m)=>s+m.stats.overallRate,0)/D.members.length:0;
  const tabs=[{id:"dash",l:"대시보드"},{id:"members",l:"멤버"},{id:"weekly",l:"주간체크"},{id:"graph",l:"그래프"},...(S.isAdmin?[{id:"settings",l:"설정"}]:[])];

  const pc={rest1:{bg:"#E8E7F0",c:NAVY},rest2:{bg:"#E2E8F0",c:"#334155"},op:{bg:NAVY,c:"#fff"},ended:{bg:"#FEE2E2",c:RED},unknown:{bg:"#F1F5F9",c:MID},before_op:{bg:"#E2E8F0",c:"#334155"}}[CP.phase]||{bg:"#F1F5F9",c:MID};

  let html='<div class="header"><div class="header-row"><div><h1>바른생활루틴이들</h1><div class="sub">'+cfg.currentWeek+'주차 / 총 '+cfg.totalWeeks+'주</div><span class="badge" style="background:'+pc.bg+';color:'+pc.c+'">'+CP.label+'</span></div>';
  if(S.isAdmin)html+='<button class="btn-admin" onclick="S.isAdmin=false;render()">방장</button>';
  else html+='<button class="btn-login" onclick="S.pwInput=\'\';S.modal=\'login\';render()">로그인</button>';
  html+='</div></div>';

  html+='<div class="tabs">';
  tabs.forEach(t=>{html+='<button class="'+(S.tab===t.id?"active":"")+'" onclick="S.tab=\''+t.id+'\';render()">'+t.l+'</button>'});
  html+='</div><div class="content">';

  // ─── Dashboard ───
  if(S.tab==="dash"){
    html+='<div class="card" style="padding:14px"><div style="font-weight:700;font-size:13px;color:'+NAVY+';margin-bottom:10px">운영 일정</div>';
    [{l:"안식주1 · 목표작성",s:P.rest1Start,e:P.rest1End,p:"rest1"},{l:"안식주2 · 휴식",s:P.rest2Start,e:P.rest2End,p:"rest2"},{l:"운영기간 · "+cfg.totalWeeks+"주",s:P.opStart,e:P.opEnd,p:"op"}].forEach((r,i)=>{
      html+='<div class="period-row"'+(i>0?' style="border-top:1px solid #F8F9FC"':'')+'><div style="display:flex;align-items:center">';
      if(CP.phase===r.p)html+='<span class="period-dot"></span>';
      html+='<span style="font-size:13px;color:'+(CP.phase===r.p?NAVY:"#64748B")+';font-weight:'+(CP.phase===r.p?700:400)+'">'+r.l+'</span></div><span style="font-size:11px;color:'+MID+'">'+fmtDate(r.s)+' ~ '+fmtDate(r.e)+'</span></div>';
    });
    html+='</div>';
    html+='<div class="stat-grid">';
    [{l:"참여인원",v:D.members.length+"명"},{l:"진행주차",v:cfg.currentWeek+"주차"},{l:"평균달성",v:pct(avgRate)}].forEach(s=>{
      html+='<div class="stat-box"><div class="stat-label">'+s.l+'</div><div class="stat-val">'+s.v+'</div></div>'});
    html+='</div>';

    if(!D.members.length)html+='<div style="text-align:center;padding:56px 0;color:'+MID+'">멤버를 먼저 추가해</div>';
    else byGrp.forEach(g=>{
      if(!g.members.length)return;
      html+='<div class="card-flush"><div class="group-header" style="border-color:'+g.border+';background:'+(g.gid===4?"#FEF2F2":"#F8F9FC")+'"><div><span style="font-weight:700;color:'+g.text+';font-size:14px">'+g.label+'</span><span style="font-size:11px;color:'+MID+';margin-left:8px">'+g.range+'</span></div><span style="font-size:11px;font-weight:700;color:'+g.text+';background:#fff;padding:2px 10px;border-radius:20px;border:1px solid '+g.border+'">'+g.members.length+'명</span></div>';
      g.members.forEach(m=>{
        const rk=mws.indexOf(m)+1;
        html+='<div class="member-row" onclick="S.selId=\''+m.id+'\';S.modal=\'detail\';render()"><span class="rank-circle" style="background:'+(rk<=3?NAVY:"#E8E7F0")+';color:'+(rk<=3?"#fff":"#64748B")+'">'+rk+'</span><div style="flex:1"><span style="font-weight:600;font-size:14px;color:'+NAVY+'">'+m.name+'</span>'+(m.nickname?'<span style="font-size:11px;color:'+MID+';margin-left:6px">'+m.nickname+'</span>':'')+'</div><div style="text-align:right"><div style="font-weight:900;color:'+NAVY+';font-size:17px">'+pct(m.stats.overallRate)+'</div><div style="font-size:10px;color:'+MID+'">'+m.stats.totalAchieved+'/'+m.stats.totalTarget+'회</div></div></div>';
      });
      html+='</div>';
    });
  }

  // ─── Members ───
  if(S.tab==="members"){
    if(S.isAdmin){
      html+='<div style="display:flex;gap:8px;margin-bottom:10px"><input class="inp" style="flex:1" placeholder="멤버 이름 입력" data-sid="newName" value="'+esc(S.newName)+'" oninput="S.newName=this.value" onkeydown="if(event.key===\'Enter\')addMember()"><button class="btn" onclick="addMember()">추가</button></div>';
    }
    if(!D.members.length)html+='<div style="text-align:center;padding:40px 0;color:'+MID+'">멤버가 없어</div>';
    mws.forEach(m=>{
      const gc=GC[m.stats.groupId];
      html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700;font-size:15px;color:'+NAVY+'">'+m.name+'</span>';
      if(m.nickname&&S.nicknameEdit[m.id]===undefined)html+='<span style="font-size:12px;color:'+MID+'">'+m.nickname+'</span>';
      html+='</div><span style="background:'+gc.badge+';color:'+gc.text+';padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700">'+pct(m.stats.overallRate)+'</span></div>';

      html+='<div style="margin-bottom:8px">';
      if(S.nicknameEdit[m.id]!==undefined){
        html+='<div style="display:flex;gap:6px;align-items:center"><input class="inp" style="flex:1;padding:6px 10px;font-size:12px" placeholder="별명 입력" data-sid="nick_'+m.id+'" value="'+esc(S.nicknameEdit[m.id]||"")+'" oninput="S.nicknameEdit[\''+m.id+'\']=this.value"><button class="btn" style="padding:6px 12px;font-size:11px" onclick="saveNick(\''+m.id+'\')">저장</button><button class="btn-outline" style="padding:6px 10px;font-size:11px" onclick="delete S.nicknameEdit[\''+m.id+'\'];render()">취소</button></div>';
      } else {
        html+='<button class="btn-outline" style="padding:4px 10px;font-size:11px" onclick="S.nicknameEdit[\''+m.id+'\']='+"'"+esc(m.nickname||"")+"'"+';render()">'+(m.nickname?"별명 수정":"별명 추가")+'</button>';
      }
      html+='</div>';

      html+='<div style="display:flex;flex-wrap:wrap;gap:5px">';
      m.goals.forEach(g=>{html+='<span class="goal-tag">'+g.name+' '+g.target+'회/주</span>'});
      html+='</div>';

      html+='<div style="display:flex;gap:8px;margin-top:10px">';
      html+='<button class="btn-outline" style="flex:1" onclick="openGoals(\''+m.id+'\')">목표 편집'+(goalLocked&&!S.isAdmin?" (잠김)":"")+'</button>';
      if(S.isAdmin){
        if(S.deleteConfirm===m.id){
          html+='<div style="display:flex;gap:6px"><button style="padding:8px 12px;border:none;border-radius:8px;background:'+RED+';color:#fff;font-weight:700;cursor:pointer;font-size:12px" onclick="delMember(\''+m.id+'\')">확인</button><button class="btn-outline" onclick="S.deleteConfirm=null;render()">취소</button></div>';
        } else {
          html+='<button style="padding:8px 14px;border:1px solid #FCA5A5;border-radius:8px;background:none;cursor:pointer;font-size:12px;color:'+RED+'" onclick="S.deleteConfirm=\''+m.id+'\';render()">삭제</button>';
        }
      }
      html+='</div></div>';
    });
  }

  // ─── Weekly ───
  if(S.tab==="weekly"){
    html+='<div style="background:'+NAVY+';color:#fff;border-radius:10px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;font-size:17px">'+cfg.currentWeek+'주차 수행체크</div><div style="font-size:11px;color:'+MID+';margin-top:2px">방장만 입력 가능</div></div>';
    if(S.isAdmin)html+='<span style="background:#fff;color:'+NAVY+';padding:4px 10px;border-radius:20px;font-size:11px;font-weight:800">편집 모드</span>';
    html+='</div>';

    if(!D.members.length)html+='<div style="text-align:center;padding:40px 0;color:'+MID+'">멤버를 먼저 추가해</div>';
    D.members.forEach(m=>{
      const dn=m.nickname?m.name+" ("+m.nickname+")":m.name;
      const rec=D.records["w"+cfg.currentWeek]?.[m.id]||{};
      html+='<div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:10px;color:'+NAVY+'">'+dn+'</div>';
      m.goals.forEach((g,gi)=>{
        const sv=rec[gi],iv=S.weekInputs[m.id]?.[gi],dv=iv!==undefined?iv:sv;
        const rate=sv!==undefined?Math.min(+sv/g.target,1):null;
        html+='<div style="display:flex;align-items:center;margin-bottom:'+(gi<m.goals.length-1?"10":"0")+'px"><div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:500;color:'+NAVY+'">'+g.name+'</span><span style="font-size:11px;color:'+MID+'">목표 '+g.target+'회</span></div>';
        if(rate!==null)html+='<div class="progress-bar"><div class="progress-fill" style="width:'+Math.min(rate*100,100)+'%;background:'+(rate>=1?GREEN:NAVY)+'"></div></div>';
        html+='</div>';
        if(S.isAdmin){
          html+='<input type="number" min="0" data-sid="wk_'+m.id+'_'+gi+'" value="'+(dv!=null?dv:"")+'" placeholder="0" style="width:52px;margin-left:10px;text-align:center;padding:6px;border:1px solid #E8E7F0;border-radius:6px;font-size:14px;background:#fff;outline:none" oninput="setWeekInput(\''+m.id+'\','+gi+',this.value)">';
        } else {
          const c=sv!==undefined?(+sv>=g.target?GREEN:NAVY):"#CBD5E1";
          html+='<span style="font-weight:700;margin-left:12px;font-size:15px;color:'+c+'">'+(sv!==undefined?sv+"회":"-")+'</span>';
        }
        html+='</div>';
      });
      html+='</div>';
    });
    if(S.isAdmin&&D.members.length)html+='<button class="btn" style="width:100%;padding:14px;font-size:15px;margin-top:4px;border-radius:10px" onclick="saveWeekly()">'+cfg.currentWeek+'주차 저장</button>';
  }

  // ─── Graph ───
  if(S.tab==="graph"){
    html+='<div style="background:'+NAVY+';color:#fff;border-radius:10px;padding:14px 16px;margin-bottom:14px"><div style="font-weight:700;font-size:17px">주간 수행률 추이</div><div style="font-size:11px;color:'+MID+';margin-top:2px">'+cfg.currentWeek+'주차까지</div></div>';
    if(!D.members.length)html+='<div style="text-align:center;padding:56px 0;color:'+MID+'">데이터 없음</div>';
    else mws.forEach(m=>{
      const wd=getWeeklyRates(m,D.records,cfg.currentWeek),has=wd.some(d=>d!==null);
      html+='<div class="card-flush" style="margin-bottom:14px"><div style="padding:14px 16px 8px;display:flex;justify-content:space-between;align-items:center"><div><span style="font-weight:700;font-size:15px;color:'+NAVY+'">'+m.name+'</span>'+(m.nickname?'<span style="font-size:11px;color:'+MID+';margin-left:6px">'+m.nickname+'</span>':'')+'</div><div style="text-align:right"><span style="font-weight:900;font-size:20px;color:'+NAVY+'">'+pct(m.stats.overallRate)+'</span><div style="font-size:10px;color:'+MID+'">누적 달성률</div></div></div>';
      if(has)html+='<div class="chart-container"><canvas id="chart_'+m.id+'"></canvas></div>';
      else html+='<div style="padding:24px 16px;text-align:center;color:'+MID+';font-size:13px">아직 기록 없음</div>';
      html+='</div>';
    });
  }

  // ─── Settings ───
  if(S.tab==="settings"&&S.isAdmin){
    html+='<div class="card"><div style="font-weight:700;margin-bottom:14px;color:'+NAVY+';font-size:15px">운영 기간 설정</div>';
    if(!S.periodEdit){
      [{l:"안식주1 · 목표작성",s:P.rest1Start,e:P.rest1End},{l:"안식주2 · 휴식",s:P.rest2Start,e:P.rest2End},{l:"운영기간",s:P.opStart,e:P.opEnd}].forEach((r,i)=>{
        html+='<div style="display:flex;justify-content:space-between;padding:8px 0;'+(i>0?"border-top:1px solid #F8F9FC":"")+'"><span style="font-size:13px;color:'+NAVY+';font-weight:500">'+r.l+'</span><span style="font-size:12px;color:'+MID+'">'+fmtDate(r.s)+' ~ '+fmtDate(r.e)+'</span></div>';
      });
      html+='<button class="btn-outline" style="width:100%;padding:10px;margin-top:8px;font-size:13px" onclick="S.periodEdit={...S.data.config.periods};render()">기간 수정</button>';
    } else {
      [{l:"안식주1 시작",k:"rest1Start"},{l:"안식주1 종료",k:"rest1End"},{l:"안식주2 시작",k:"rest2Start"},{l:"안식주2 종료",k:"rest2End"},{l:"운영 시작",k:"opStart"},{l:"운영 종료",k:"opEnd"}].forEach(f=>{
        html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:12px;color:'+NAVY+';font-weight:500;min-width:80px">'+f.l+'</span><input type="date" class="inp" style="flex:1;padding:8px 10px;font-size:12px" data-sid="pe_'+f.k+'" value="'+(S.periodEdit[f.k]||"")+'" oninput="S.periodEdit[\''+f.k+'\']=this.value"></div>';
      });
      html+='<div style="display:flex;gap:8px;margin-top:8px"><button class="btn-outline" style="flex:1;padding:10px" onclick="S.periodEdit=null;render()">취소</button><button class="btn" style="flex:1;padding:10px" onclick="savePeriods()">저장</button></div>';
    }
    html+='</div>';

    html+='<div class="card"><div style="font-weight:700;margin-bottom:14px;color:'+NAVY+';font-size:15px">운영 설정</div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:14px;color:'+NAVY+'">총 운영 주수</span><div style="display:flex;gap:6px">';
    [8,10,12].forEach(w=>{html+='<button style="padding:7px 14px;border:1px solid #E8E7F0;border-radius:6px;cursor:pointer;background:'+(cfg.totalWeeks===w?NAVY:"#fff")+';color:'+(cfg.totalWeeks===w?"#fff":NAVY)+';font-weight:'+(cfg.totalWeeks===w?800:400)+';font-size:13px" onclick="save({...S.data,config:{...S.data.config,totalWeeks:'+w+'}})">'+w+'주</button>'});
    html+='</div></div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:14px;color:'+NAVY+'">현재 주차 조정</span><div style="display:flex;gap:8px;align-items:center"><button style="width:32px;height:32px;border:1px solid #E8E7F0;border-radius:6px;cursor:pointer;background:#fff;font-size:14px;color:'+NAVY+'" onclick="adjWeek(-1)">◀</button><span style="font-weight:800;min-width:56px;text-align:center;font-size:16px;color:'+NAVY+'">'+cfg.currentWeek+'주차</span><button style="width:32px;height:32px;border:none;border-radius:6px;cursor:pointer;background:'+NAVY+';color:#fff;font-size:14px" onclick="adjWeek(1)">▶</button></div></div></div>';

    html+='<div class="card"><div style="font-weight:700;margin-bottom:10px;color:'+NAVY+'">비밀번호 변경</div><div style="display:flex;gap:8px"><input type="password" class="inp" style="flex:1" placeholder="새 비밀번호" data-sid="newPw" value="'+esc(S.newPw)+'" oninput="S.newPw=this.value"><button class="btn" onclick="changePw()">변경</button></div></div>';

    html+='<div class="card" style="border:1px solid #FCA5A5"><div style="font-weight:700;margin-bottom:6px;color:'+RED+'">데이터 초기화</div><div style="font-size:12px;color:'+MID+';margin-bottom:10px">모든 멤버, 목표, 기록이 삭제됨. 복구 불가.</div>';
    if(S.deleteConfirm==="reset")html+='<div style="display:flex;gap:8px"><button style="flex:1;background:'+RED+';color:#fff;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer" onclick="resetAll()">진짜 삭제</button><button class="btn-outline" style="flex:1;padding:10px" onclick="S.deleteConfirm=null;render()">취소</button></div>';
    else html+='<button class="btn-danger" onclick="S.deleteConfirm=\'reset\';render()">초기화</button>';
    html+='</div>';
  }

  html+='</div>'; // content end

  // ─── Modals ───
  if(S.modal==="login"){
    html+='<div class="overlay" onclick="S.modal=null;render()"><div class="modal" onclick="event.stopPropagation()"><div style="font-weight:800;font-size:18px;margin-bottom:4px;color:'+NAVY+'">방장 로그인</div><div style="font-size:12px;color:'+MID+';margin-bottom:16px">비밀번호를 입력해</div><input type="password" class="inp" style="margin-bottom:14px" placeholder="비밀번호" data-sid="pwInput" value="'+esc(S.pwInput)+'" oninput="S.pwInput=this.value" onkeydown="if(event.key===\'Enter\')doLogin()"><div style="display:flex;gap:8px"><button class="btn-outline" style="flex:1;padding:12px;font-size:14px" onclick="S.modal=null;render()">취소</button><button class="btn" style="flex:1;padding:12px;font-size:14px" onclick="doLogin()">로그인</button></div></div></div>';
  }

  if(S.modal==="goals"&&S.selId){
    const mem=D.members.find(m=>m.id===S.selId);
    html+='<div class="overlay overlay-bottom" onclick="S.modal=null;render()"><div class="modal-bottom" onclick="event.stopPropagation()"><div style="font-weight:800;font-size:18px;margin-bottom:4px;color:'+NAVY+'">'+(mem?mem.name:"")+'의 목표</div>';
    if(goalLocked&&!S.isAdmin)html+='<div style="background:#F8F9FC;border:1px solid #E8E7F0;border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:12px;color:'+NAVY+'">목표 입력 기간이 지나서 수정할 수 없어. 방장에게 요청해.</div>';
    else html+='<div style="font-size:12px;color:'+MID+';margin-bottom:14px">운동(1번)은 필수이며 최소 2회 | 최대 6개</div>';

    S.goalForm.forEach((g,i)=>{
      const canName=!(goalLocked&&!S.isAdmin)&&i!==0;
      const canTgt=!(goalLocked&&!S.isAdmin);
      html+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><input class="inp" style="flex:2;background:'+(canName?"#fff":"#F8F9FC")+'" placeholder="목표명" data-sid="gn_'+i+'" value="'+esc(g.name)+'" '+(canName?'':'disabled')+' oninput="S.goalForm['+i+'].name=this.value"><input type="number" min="'+(i===0?2:1)+'" class="inp" style="width:52px;text-align:center;padding:10px 4px;background:'+(canTgt?"#fff":"#F8F9FC")+'" data-sid="gt_'+i+'" value="'+g.target+'" '+(canTgt?'':'disabled')+' oninput="S.goalForm['+i+'].target=Math.max('+(i===0?2:1)+',+this.value)"><span style="font-size:11px;color:'+MID+';white-space:nowrap">회/주</span>';
      if(i>0&&canTgt)html+='<button style="color:'+RED+';border:none;background:none;cursor:pointer;font-size:22px;padding:0 4px;line-height:1;flex-shrink:0" onclick="S.goalForm.splice('+i+',1);render()">×</button>';
      html+='</div>';
    });
    if(S.goalForm.length<6&&!(goalLocked&&!S.isAdmin))html+='<button style="width:100%;padding:10px;border:1px dashed '+MID+';border-radius:8px;background:none;cursor:pointer;color:'+MID+';margin-bottom:6px;font-size:13px" onclick="S.goalForm.push({name:\'\',target:1});render()">+ 목표 추가 ('+S.goalForm.length+'/6)</button>';

    html+='<div style="display:flex;gap:8px;margin-top:14px"><button class="btn-outline" style="flex:1;padding:12px;border-radius:10px;font-size:14px" onclick="S.modal=null;render()">닫기</button>';
    if(!(goalLocked&&!S.isAdmin)||S.isAdmin)html+='<button class="btn" style="flex:1;padding:12px;border-radius:10px;font-size:14px" onclick="saveGoals()">저장</button>';
    html+='</div></div></div>';
  }

  if(S.modal==="detail"&&selMem){
    const gc=GC[selMem.stats.groupId],wd=getWeeklyRates(selMem,D.records,cfg.currentWeek),has=wd.some(d=>d!==null);
    html+='<div class="overlay overlay-bottom" onclick="S.modal=null;render()"><div class="modal-bottom" style="max-height:85vh" onclick="event.stopPropagation()">';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px"><div><div style="font-weight:800;font-size:22px;color:'+NAVY+'">'+selMem.name+'</div>'+(selMem.nickname?'<div style="font-size:13px;color:'+MID+';margin-top:2px">'+selMem.nickname+'</div>':'')+'<span style="background:'+gc.badge+';color:'+gc.text+';padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;display:inline-block;margin-top:6px">'+gc.label+'</span></div><div style="text-align:right"><div style="font-size:36px;font-weight:900;color:'+NAVY+';line-height:1">'+pct(selMem.stats.overallRate)+'</div><div style="font-size:11px;color:'+MID+';margin-top:4px">'+selMem.stats.totalAchieved+'/'+selMem.stats.totalTarget+'회 누적</div></div></div>';

    if(has)html+='<div style="background:'+NAVY+';border-radius:10px;padding:12px 8px;margin-bottom:16px"><div style="font-size:11px;color:'+MID+';font-weight:600;padding:0 8px 6px">주간 추이</div><div style="height:120px"><canvas id="chart_detail_'+selMem.id+'"></canvas></div></div>';

    html+='<div style="border-top:1px solid #E8E7F0;padding-top:14px"><div style="font-size:12px;color:'+MID+';font-weight:700;margin-bottom:12px;letter-spacing:0.5px">목표별 달성률</div>';
    selMem.stats.goalStats.forEach(gs=>{
      const c=gs.rate>=1?GREEN:gs.rate>=0.5?NAVY:RED;
      html+='<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:14px;font-weight:600;color:'+NAVY+'">'+gs.name+'</span><span style="font-size:14px;font-weight:800;color:'+c+'">'+pct(gs.rate)+'</span></div><div style="height:5px;background:#E8E7F0;border-radius:3px;overflow:hidden"><div style="height:5px;width:'+Math.min(gs.rate*100,100)+'%;background:'+c+';border-radius:3px"></div></div><div style="display:flex;justify-content:space-between;margin-top:3px"><span style="font-size:10px;color:'+MID+'">'+gs.achieved+'회 / '+gs.weeklyTarget+'회x'+gs.weekCount+'주 = 목표 '+gs.target+'회</span>'+(gs.target>0&&gs.rate<0.5?'<span style="font-size:10px;color:'+RED+';font-weight:700">C등급 사유</span>':'')+'</div></div>';
    });
    html+='</div><button style="width:100%;background:#F8F9FC;color:'+NAVY+';border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;margin-top:8px;font-size:14px" onclick="S.modal=null;render()">닫기</button></div></div>';
  }

  if(S.toast)html+='<div class="toast">'+S.toast+'</div>';

  app.innerHTML=html;

  // Restore focus
  if(activeId){
    const el=document.querySelector('[data-sid="'+activeId+'"]');
    if(el){el.focus();try{el.setSelectionRange(selStart,selEnd)}catch(e){}}
  }

  // Draw charts
  if(S.tab==="graph"){
    mws.forEach(m=>{
      const canvas=document.getElementById("chart_"+m.id);
      if(!canvas)return;
      const wd=getWeeklyRates(m,D.records,cfg.currentWeek);
      if(S.charts[m.id])S.charts[m.id].destroy();
      S.charts[m.id]=new Chart(canvas,{type:"line",data:{labels:wd.map((_,i)=>(i+1)+"주"),datasets:[{data:wd,borderColor:NAVY,backgroundColor:"rgba(30,27,75,0.08)",borderWidth:2.5,pointBackgroundColor:NAVY,pointBorderColor:"#fff",pointBorderWidth:2,pointRadius:4,fill:true,tension:0.3,spanGaps:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:NAVY,cornerRadius:8,callbacks:{label:c=>c.parsed.y!=null?c.parsed.y+"%":"-"}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:MID}},y:{min:0,max:120,grid:{color:"#F1F5F9"},ticks:{font:{size:10},color:MID,callback:v=>v+"%"}}}}});
    });
  }
  if(S.modal==="detail"&&selMem){
    const canvas=document.getElementById("chart_detail_"+selMem.id);
    if(canvas){
      const wd=getWeeklyRates(selMem,D.records,cfg.currentWeek);
      const k="d_"+selMem.id;
      if(S.charts[k])S.charts[k].destroy();
      S.charts[k]=new Chart(canvas,{type:"line",data:{labels:wd.map((_,i)=>(i+1)+"주"),datasets:[{data:wd,borderColor:"#fff",backgroundColor:"rgba(255,255,255,0.1)",borderWidth:2,pointBackgroundColor:"#fff",pointRadius:3,fill:true,tension:0.3,spanGaps:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#fff",titleColor:NAVY,bodyColor:NAVY,cornerRadius:8,callbacks:{label:c=>c.parsed.y!=null?c.parsed.y+"%":"-"}}},scales:{x:{grid:{display:false},ticks:{font:{size:9},color:MID}},y:{min:0,max:120,grid:{color:"rgba(255,255,255,0.08)"},ticks:{font:{size:9},color:"#64748B",callback:v=>v+"%"}}}}});
    }
  }
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// ─── Actions ───
function doLogin(){if(S.pwInput===S.data.config.adminPw){S.isAdmin=true;S.modal=null;S.pwInput="";showToast("방장 모드 활성화")}else showToast("비밀번호 틀림")}
function addMember(){if(!S.newName.trim())return;const n=S.newName.trim();save({...S.data,members:[...S.data.members,{id:Date.now().toString(),name:n,nickname:"",goals:[{name:"운동",target:2}]}]});S.newName="";showToast(n+" 추가됨")}
function saveNick(id){save({...S.data,members:S.data.members.map(m=>m.id===id?{...m,nickname:S.nicknameEdit[id]||""}:m)});delete S.nicknameEdit[id];showToast("별명 저장")}
function delMember(id){save({...S.data,members:S.data.members.filter(m=>m.id!==id)});S.deleteConfirm=null}
function openGoals(id){const m=S.data.members.find(m=>m.id===id);S.selId=id;S.goalForm=m.goals.map(g=>({...g}));S.modal="goals";render()}
function saveGoals(){const v=S.goalForm.filter(g=>g.name.trim()&&g.target>0);if(!v.length)return;if(v[0].target<2){showToast("운동은 최소 2회");return}save({...S.data,members:S.data.members.map(m=>m.id===S.selId?{...m,goals:v}:m)});S.modal=null;showToast("목표 저장됨")}
function setWeekInput(mid,gi,val){if(!S.weekInputs[mid])S.weekInputs[mid]={};S.weekInputs[mid][gi]=val}
function saveWeekly(){const d={...S.data};if(!d.records)d.records={};const wk="w"+d.config.currentWeek;if(!d.records[wk])d.records[wk]={};Object.entries(S.weekInputs).forEach(([mid,gs])=>{if(!d.records[wk][mid])d.records[wk][mid]={};Object.entries(gs).forEach(([gi,v])=>{if(v!==""&&v!==undefined)d.records[wk][mid][gi]=+v})});save(d);S.weekInputs={};showToast("저장 완료")}
function savePeriods(){save({...S.data,config:{...S.data.config,periods:{...S.periodEdit}}});S.periodEdit=null;showToast("기간 저장됨")}
function adjWeek(d){const c=S.data.config.currentWeek+d;if(c>=1&&c<=S.data.config.totalWeeks){save({...S.data,config:{...S.data.config,currentWeek:c}});if(d>0)showToast(c+"주차 시작")}}
function changePw(){if(!S.newPw)return;save({...S.data,config:{...S.data.config,adminPw:S.newPw}});S.newPw="";showToast("변경됨")}
function resetAll(){save(mkData());S.isAdmin=false;S.tab="dash";S.deleteConfirm=null;showToast("초기화 완료")}
</script>
</body>
</html>
